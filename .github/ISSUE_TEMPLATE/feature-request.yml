name: Feature Request
description: Suggest an idea
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Heyo! Thank you for wanting to suggest features that could possibly improve our mod.
        Before you do, please check whether it may have been suggested before, or if the feature is already present in the mod.
        Please be as detailed as possible, so we can consider and implement the feature as good as possible.

  - type: textarea
    attributes:
      label: Is your feature request related to a problem?
      description: Please give some context for this request. Why do you want it added?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe the solution you'd like.
      description: A clear and concise description of what you want.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe alternatives you've considered.
      description: List any alternatives you might have tried to get the feature you want.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Other
      description: Feel free to add other context or screenshots about the feature request here.
    validations:
      required: false