name: Publish package to Maven Repositories
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Publish package
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TS_MAVEN_USERNAME: ${{ secrets.TS_MAVEN_USERNAME }}
          TS_MAVEN_SECRET: ${{ secrets.TS_MAVEN_SECRET }}
          REPSY_USERNAME: ${{ secrets.REPSY_USERNAME }}
          REPSY_SECRET: ${{ secrets.REPSY_SECRET }}
